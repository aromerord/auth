<div class="container">
  <div class="row justify-content-center">
    <div class="col-sm-8 col-md-6 col-lg-5 col-xl-5" style="margin-top: 8%;">
      <h3 class="text-center mb-2">Login</h3>
      <form [formGroup]="form" (ngSubmit)="login()">

        <div class="form-outline mb-4">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="Email" 
            formControlName="email"/>
        </div>
  
        <div class="form-outline mb-4">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Contraseña" 
            formControlName="password" />
        </div>
  
        <div class="text-end">
          <button type="submit" class="btn btn-primary mb-4" [disabled]="form.invalid">Acceder</button>
        </div>
        
        <div class="text-center">
          <p>¿No tienes cuenta? <a href="#!" [routerLink]="['/registro']">Regístrate</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
